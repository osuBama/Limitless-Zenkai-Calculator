<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zenkai Optimiser — Dragonfist Limitless</title>
  <style>html,body{margin:0;background:#1a1208;padding:24px;}</style>
</head>
<body>
<div id="zenkai-calc">
  <div class="zc-frame" role="region" aria-labelledby="zc-heading">
    <h2 class="zc-heading" id="zc-heading">Zenkai Calculator Limitless</h2>
    <p class="zc-tagline">Putting the "Zen" back in Zenkai!</p>
 
    <fieldset class="zc-controls">
      <legend class="zc-vh">Your stats</legend>
 
      <div class="zc-field">
        <label for="zc-record">Base Power Record</label>
        <input type="number" id="zc-record" min="0" step="any" value="3300000"
               inputmode="decimal" autocomplete="off">
      </div>
 
      <div class="zc-field">
        <label for="zc-current">Current Base Power</label>
        <input type="number" id="zc-current" min="0" step="any" value="0"
               inputmode="decimal" autocomplete="off">
      </div>
 
      <div class="zc-field zc-field--narrow">
        <label for="zc-done">Zenkais Done</label>
        <select id="zc-done" autocomplete="off">
          <option value="0" selected>0</option>
          <option value="1">1</option>
          <option value="2">2</option>
        </select>
      </div>
 
      <div class="zc-field zc-field--toggle">
        <span class="zc-field-label" id="zc-pu-label">Power Up Unlocked?</span>
        <label class="zc-switch">
          <input type="checkbox" id="zc-unlocked" aria-describedby="zc-pu-help">
          <span class="zc-track" aria-hidden="true"></span>
          <span class="zc-swtext">Off</span>
        </label>
        <span class="zc-vh" id="zc-pu-help">Applies the aura boost when computing the minimum boss power level. Does not change which targets are chosen.</span>
      </div>
    </fieldset>
 
    <output class="zc-results" id="zc-results" aria-live="polite" for="zc-record zc-current zc-done zc-unlocked"></output>
 
    <p class="zc-note" id="zc-note"></p>
 
    <div class="zc-search" role="group" aria-labelledby="zc-search-heading">
      <p class="zc-search-heading" id="zc-search-heading">PP Boss Search</p>
      <div class="zc-search-cols">
        <div class="zc-search-box">
          <p class="zc-search-subheading">Find a PP Boss by Power Level</p>
          <div class="zc-field">
            <label for="zc-search-pl">Target Power Level</label>
            <input type="number" id="zc-search-pl" min="0" step="any" value=""
                   inputmode="decimal" autocomplete="off" placeholder="e.g. 1500000">
          </div>
          <output class="zc-search-out" id="zc-search-out" aria-live="polite" for="zc-search-pl"></output>
        </div>
        <div class="zc-search-box">
          <p class="zc-search-subheading">Find a boss for Zenkai</p>
          <div class="zc-field">
            <label for="zc-search-zenkai-pl">Your Power Level (powered up)</label>
            <input type="number" id="zc-search-zenkai-pl" min="0" step="any" value=""
                   inputmode="decimal" autocomplete="off" placeholder="e.g. 1500000">
          </div>
          <output class="zc-search-out" id="zc-search-zenkai-out" aria-live="polite" for="zc-search-zenkai-pl"></output>
        </div>
      </div>
    </div>
  </div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
 
#zenkai-calc{
  --wood-dark:#2c1d10;
  --wood:#4a3420;
  --panel:#6b4a2a;
  --panel-inset:#3d2817;
  --panel-inset-2:#2a1c10;
  --bevel-light:#8a6238;
  --bevel-dark:#1c1108;
  --gold:#f4c542;
  --gold-dim:#b8902a;
  --ink:#e8d6b8;
  --ink-dim:#c2a877;
  --green:#5fc54a;
  --green-dark:#2f6b22;
  --purple:#9b6dd6;
  --purple-text:#b58ce6;
  --cream:#efe4cc;
  --bad:#c5503a;
  font-family:'Press Start 2P', 'Courier New', monospace;
  color:var(--ink);
  -webkit-font-smoothing:none;
  font-smoothing:none;
  image-rendering:pixelated;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:0;
  max-width:1040px;
  margin:0 auto;
}
#zenkai-calc *{box-sizing:border-box}
 
#zenkai-calc .zc-frame{
  background:var(--panel);
  border:4px solid var(--bevel-dark);
  border-top-color:var(--bevel-light);
  border-left-color:var(--bevel-light);
  box-shadow:inset 0 0 0 4px var(--wood-dark), 0 6px 0 var(--bevel-dark);
  padding:22px 20px 18px;
  flex:1 1 760px;
  max-width:760px;
  position:relative;
  z-index:1;
}
 
/* The sage stands beside the panel, slightly overlapping its right edge,
   and rises taller than the frame like the in-game characters. */
#zenkai-calc .zc-sage{
  flex:0 0 auto;
  width:300px;
  height:auto;
  margin-left:-32px;
  margin-bottom:-6px;
  align-self:flex-end;
  image-rendering:auto;
  pointer-events:none;
  user-select:none;
  filter:drop-shadow(0 6px 0 rgba(0,0,0,.35));
}
@media (max-width:900px){
  #zenkai-calc{display:block;max-width:760px}
  #zenkai-calc .zc-sage{display:none}
}
 
#zenkai-calc .zc-heading{
  font-size:20px;
  line-height:1.3;
  color:var(--gold);
  text-shadow:3px 3px 0 var(--bevel-dark);
  margin:4px 0 10px;
  letter-spacing:1px;
}
#zenkai-calc .zc-tagline{
  font-size:9px;
  line-height:1.6;
  color:var(--ink);
  margin:0 0 18px;
}
 
/* visually-hidden but screen-reader-available */
#zenkai-calc .zc-vh{
  position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;
}
 
#zenkai-calc .zc-controls{
  border:3px solid var(--bevel-dark);
  border-top-color:var(--bevel-light);
  border-left-color:var(--bevel-light);
  background:var(--panel-inset);
  padding:16px 14px;
  margin:0 0 16px;
  display:flex;
  flex-wrap:wrap;
  gap:16px;
  align-items:flex-end;
}
#zenkai-calc .zc-field{
  display:flex;
  flex-direction:column;
  gap:9px;
  flex:1 1 200px;
}
#zenkai-calc .zc-field--narrow{flex:0 1 110px}
#zenkai-calc label,
#zenkai-calc .zc-field-label{
  font-size:9px;
  line-height:1.5;
  color:var(--gold);
  letter-spacing:.5px;
}
#zenkai-calc input[type=number],
#zenkai-calc select{
  font-family:inherit;
  font-size:13px;
  color:var(--cream);
  background:var(--panel-inset-2);
  border:3px solid var(--bevel-dark);
  border-top-color:#000;
  border-left-color:#000;
  padding:10px 10px;
  width:100%;
  -webkit-font-smoothing:none;
}
#zenkai-calc select{
  cursor:pointer;
  -webkit-appearance:none;appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);
  background-position:calc(100% - 16px) 16px,calc(100% - 10px) 16px;
  background-size:6px 6px,6px 6px;
  background-repeat:no-repeat;
  padding-right:28px;
}
#zenkai-calc input[type=number]:focus-visible,
#zenkai-calc select:focus-visible{
  outline:3px solid var(--gold);
  outline-offset:2px;
}
 
/* toggle */
#zenkai-calc .zc-field--toggle{flex:1 1 160px}
#zenkai-calc .zc-switch{
  display:inline-flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}
#zenkai-calc .zc-switch input{
  position:absolute;width:1px;height:1px;opacity:0;
}
#zenkai-calc .zc-track{
  width:46px;height:24px;flex:none;
  background:var(--panel-inset-2);
  border:3px solid var(--bevel-dark);
  border-top-color:#000;border-left-color:#000;
  position:relative;
}
#zenkai-calc .zc-track::after{
  content:"";position:absolute;top:2px;left:2px;
  width:14px;height:14px;background:var(--ink-dim);
  transition:none;
}
#zenkai-calc .zc-switch input:checked + .zc-track{background:var(--green-dark)}
#zenkai-calc .zc-switch input:checked + .zc-track::after{left:24px;background:var(--green)}
#zenkai-calc .zc-switch input:focus-visible + .zc-track{outline:3px solid var(--gold);outline-offset:2px}
#zenkai-calc .zc-swtext{font-size:9px;color:var(--ink-dim)}
 
/* results */
#zenkai-calc .zc-results{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
#zenkai-calc .zc-card{
  background:var(--panel-inset);
  border:3px solid var(--bevel-dark);
  border-top-color:var(--green-dark);
  border-left-color:var(--green-dark);
  padding:12px 11px 13px;
  display:flex;flex-direction:column;gap:0;
}
#zenkai-calc .zc-card--na{
  border-top-color:var(--bevel-light);
  border-left-color:var(--bevel-light);
  opacity:.65;
}
#zenkai-calc .zc-card--locked{
  border-top-color:var(--bevel-dark);
  border-left-color:var(--bevel-dark);
  background:var(--panel-inset-2);
  position:relative;
}
#zenkai-calc .zc-card--locked .zc-pl,
#zenkai-calc .zc-card--locked .zc-stat-v{color:var(--ink-dim)}
#zenkai-calc .zc-card--locked .zc-stat-v--gain,
#zenkai-calc .zc-card--locked .zc-stat-v--pp{color:var(--ink-dim)}
#zenkai-calc .zc-card--locked .zc-rank{color:var(--ink-dim)}
#zenkai-calc .zc-lock{
  font-size:7px;color:var(--gold-dim);letter-spacing:1px;
  border:2px solid var(--gold-dim);padding:3px 5px;
  margin-left:8px;white-space:nowrap;
}
#zenkai-calc .zc-rank-row{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;
}
#zenkai-calc .zc-rank-row .zc-rank{margin-bottom:0}
#zenkai-calc .zc-rank{
  font-size:9px;color:var(--green);letter-spacing:.5px;margin-bottom:9px;
}
#zenkai-calc .zc-card--na .zc-rank{color:var(--ink-dim)}
#zenkai-calc .zc-pl{
  font-size:16px;color:var(--cream);line-height:1.25;
  word-break:break-word;margin-bottom:5px;
}
#zenkai-calc .zc-pl-label{
  font-size:9px;color:var(--ink-dim);line-height:1.6;margin-bottom:8px;
}
#zenkai-calc .zc-powered{
  font-size:9px;color:var(--ink-dim);line-height:1.6;margin:0 0 11px;
}
#zenkai-calc .zc-powered-v{color:var(--purple-text);font-size:10px}
#zenkai-calc .zc-powered-pct{color:var(--green)}
#zenkai-calc .zc-powered--none{color:var(--ink-dim);opacity:.75}
#zenkai-calc .zc-card--locked .zc-powered-v,
#zenkai-calc .zc-card--locked .zc-powered-pct{color:var(--ink-dim)}
#zenkai-calc .zc-stat{
  border-top:2px solid var(--bevel-dark);
  padding-top:9px;margin-top:auto;
  display:flex;flex-direction:column;gap:5px;
}
#zenkai-calc .zc-stat-row{
  display:flex;justify-content:space-between;align-items:baseline;gap:6px;
}
#zenkai-calc .zc-stat-k{font-size:8px;color:var(--ink-dim);line-height:1.5}
#zenkai-calc .zc-stat-v{font-size:10px;color:var(--ink)}
#zenkai-calc .zc-stat-v--gain{color:var(--gold)}
#zenkai-calc .zc-stat-v--pp{color:var(--green)}
 
#zenkai-calc .zc-empty{
  grid-column:1/-1;text-align:center;color:var(--ink-dim);
  font-size:10px;line-height:1.8;padding:22px 12px;
  background:var(--panel-inset);
  border:3px solid var(--bevel-dark);
  border-top-color:#000;border-left-color:#000;
}
 
#zenkai-calc .zc-note{
  font-size:9px;line-height:1.9;color:var(--ink-dim);
  margin:15px 0 0;
  background:var(--panel-inset);
  border:3px solid var(--bevel-dark);
  border-top-color:#000;border-left-color:#000;
  padding:12px 13px;
}
 
#zenkai-calc .zc-search{
  margin:15px 0 0;
  background:var(--panel-inset-2);
  border:3px solid var(--bevel-dark);
  border-top-color:var(--bevel-light);
  border-left-color:var(--bevel-light);
  padding:14px 14px 16px;
}
#zenkai-calc .zc-search-heading{
  font-size:11px;color:var(--gold);letter-spacing:.5px;margin:0 0 12px;
  text-shadow:1px 1px 0 #000;
}
#zenkai-calc .zc-search-cols{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
}
#zenkai-calc .zc-search-box{
  flex:1 1 260px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:var(--panel);
  border:2px solid var(--bevel-dark);
  border-top-color:var(--bevel-light);
  border-left-color:var(--bevel-light);
  padding:12px 12px 14px;
}
#zenkai-calc .zc-search-subheading{
  font-size:9px;
  color:var(--gold);
  letter-spacing:.5px;
  margin:0;
}
#zenkai-calc .zc-search-box .zc-field{flex:none}
#zenkai-calc .zc-search-out{
  flex:none;
  width:100%;
  font-size:10px;line-height:1.8;color:var(--ink);
  min-height:40px;display:flex;align-items:center;
}
#zenkai-calc .zc-search-empty{color:var(--ink-dim)}
#zenkai-calc .zc-search-result{display:flex;flex-direction:column;gap:4px;width:100%}
#zenkai-calc .zc-search-stage{font-size:14px;color:var(--cream)}
#zenkai-calc .zc-search-stage b{color:var(--green)}
#zenkai-calc .zc-search-boss{font-size:9px;color:var(--ink-dim)}
#zenkai-calc .zc-search-boss span{color:var(--gold)}
 
@media (max-width:560px){
  #zenkai-calc .zc-results{grid-template-columns:1fr}

<script>
(function(){
  "use strict";
 
  // ---- Power-step table (Calc!A6:F30): [start, end, perLevel, levels, cumStart, cumEnd] ----
  // Extended past 40,000,000 by continuing the table's doubling pattern.
  var STEPS = (function(){
    var base = [
      [1,1.5,0.01,50,0,50],[1.5,2.5,0.02,50,50,100],[2.5,3.52,0.03,34,100,134],
      [3.52,4.52,0.04,25,134,159],[4.52,5.52,0.05,20,159,179],[5.52,6.54,0.06,17,179,196],
      [6.54,7.52,0.07,14,196,210],[7.52,20,0.08,156,210,366],[20,50.08,0.16,188,366,554],
      [50.08,50.25,0.17,1,554,555],[50.25,160,0.25,439,555,994],[160,500,0.5,680,994,1674],
      [500,2000,1,1500,1674,3174],[2000,4000,2,1000,3174,4174],[4000,8000,5,800,4174,4974],
      [8000,16004,12,667,4974,5641],[16004,16025,21,1,5641,5642],[16025,32000,25,639,5642,6281],
      [32000,120020,60,1467,6281,7748],[120020,240080,180,667,7748,8415],
      [240080,500000,360,722,8415,9137],[500000,1000000,800,625,9137,9762],
      [1000000,2000000,2000,500,9762,10262],[2000000,5000000,4000,750,10262,11012],
      [5000000,10000000,8000,625,11012,11637],[10000000,20000000,16000,625,11637,12262],
      [20000000,40000000,32000,625,12262,12887]
    ];
    var last=base[base.length-1], start=last[1], per=last[2], cum=last[5];
    while(start < 2560000000){
      var nend=start*2, nper=per*2, lv=Math.round((nend-start)/nper);
      base.push([start,nend,nper,lv,cum,cum+lv]); cum+=lv; start=nend; per=nper;
    }
    return base;
  })();
 
  // ---- PP stages (PP sheet col A = stage, col F = boss power) ----
  var PP = [[1,85.7],[2,98.4],[3,111.0],[4,125.0],[5,139.0],[6,154.0],[7,169.0],[8,185.0],[9,201.0],[10,249.0],[11,235.0],[12,253.0],[13,272.0],[14,291.0],[15,311.0],[16,332.0],[17,353.0],[18,375.0],[19,398.0],[20,482.0],[21,446.0],[22,471.0],[23,497.0],[24,524.0],[25,551.0],[26,580.0],[27,609.0],[28,640.0],[29,671.0],[30,804.0],[31,737.0],[32,772.0],[33,807.0],[34,844.0],[35,882.0],[36,921.0],[37,961.0],[38,1003.0],[39,1046.0],[40,1245.0],[41,1135.0],[42,1182.0],[43,1230.0],[44,1280.0],[45,1331.0],[46,1384.0],[47,1438.0],[48,1494.0],[49,1552.0],[50,1841.0],[51,1672.0],[52,1735.0],[53,1800.0],[54,1866.0],[55,1935.0],[56,2005.0],[57,2078.0],[58,2152.0],[59,2229.0],[60,2638.0],[61,2390.0],[62,2473.0],[63,2559.0],[64,2648.0],[65,2739.0],[66,2832.0],[67,2929.0],[68,3028.0],[69,3129.0],[70,3696.0],[71,3341.0],[72,3452.0],[73,3565.0],[74,3682.0],[75,3802.0],[76,3926.0],[77,4052.0],[78,4183.0],[79,4316.0],[80,5090.0],[81,4595.0],[82,4740.0],[83,4890.0],[84,5043.0],[85,5200.0],[86,5362.0],[87,5528.0],[88,5698.0],[89,5873.0],[90,6918.0],[91,6238.0],[92,6428.0],[93,6623.0],[94,6823.0],[95,7028.0],[96,7239.0],[97,7455.0],[98,7677.0],[99,7906.0],[100,20262.0],[101,17179.0],[102,17684.0],[103,18204.0],[104,18737.0],[105,19284.0],[106,19845.0],[107,20421.0],[108,21012.0],[109,21619.0],[110,25419.0],[111,22880.0],[112,23536.0],[113,24208.0],[114,24898.0],[115,25606.0],[116,26332.0],[117,27077.0],[118,27841.0],[119,28625.0],[120,33634.0],[121,30254.0],[122,31101.0],[123,31969.0],[124,32859.0],[125,33772.0],[126,34708.0],[127,35668.0],[128,36653.0],[129,37663.0],[130,44227.0],[131,39761.0],[132,40850.0],[133,41967.0],[134,43112.0],[135,44286.0],[136,45490.0],[137,46724.0],[138,47990.0],[139,49287.0],[140,57848.0],[141,51981.0],[142,53379.0],[143,54812.0],[144,56280.0],[145,57786.0],[146,59330.0],[147,60912.0],[148,62533.0],[149,64196.0],[150,75317.0],[151,67645.0],[152,69435.0],[153,71269.0],[154,73149.0],[155,75075.0],[156,77049.0],[157,79073.0],[158,81146.0],[159,83270.0],[160,97654.0],[161,87678.0],[162,89964.0],[163,92306.0],[164,94706.0],[165,97165.0],[166,99685.0],[167,102266.0],[168,104911.0],[169,107621.0],[170,126166.0],[171,113241.0],[172,116155.0],[173,119140.0],[174,122197.0],[175,125330.0],[176,128539.0],[177,131826.0],[178,135194.0],[179,138643.0],[180,162487.0],[181,145795.0],[182,149502.0],[183,153299.0],[184,157188.0],[185,161171.0],[186,165250.0],[187,169429.0],[188,173708.0],[189,178091.0],[190,208662.0],[191,187176.0],[192,191884.0],[193,196705.0],[194,201643.0],[195,206699.0],[196,211876.0],[197,217178.0],[198,222608.0],[199,228168.0],[200,582146.0],[201,491365.0],[202,503602.0],[203,516132.0],[204,528961.0],[205,542097.0],[206,555547.0],[207,569319.0],[208,583418.0],[209,597855.0],[210,700154.0],[211,627767.0],[212,643260.0],[213,659121.0],[214,675359.0],[215,691983.0],[216,709002.0],[217,726425.0],[218,744262.0],[219,762521.0],[220,892814.0],[221,800347.0],[222,819934.0],[223,839985.0],[224,860510.0],[225,881520.0],[226,903026.0],[227,925039.0],[228,947572.0],[229,970636.0],[230,1136279.0],[231,1018408.0],[232,1043141.0],[233,1068455.0],[234,1094365.0],[235,1120884.0],[236,1148026.0],[237,1175805.0],[238,1204237.0],[239,1233335.0],[240,1443560],[241,1293594.0],[242,1324786.0],[243,1356708.0],[244,1389378.0],[245,1422811.0],[246,1457026.0],[247,1492041.0],[248,1527873.0],[249,1564542.0],[250,1830933.0],[251,1640466.0],[252,1679761.0],[253,1719971.0],[254,1761118.0],[255,1803223.0],[256,1846308.0],[257,1890394.0],[258,1935506.0],[259,1981666.0],[260,2318740.0],[261,2077226.0],[262,2126677.0],[263,2177274.0],[264,2229045.0],[265,2282015.0],[266,2336213.0],[267,2391666.0],[268,2448402.0],[269,2506451.0],[270,2932392.0],[271,2626608.0],[272,2688777.0],[273,2752383.0],[274,2817457.0],[275,2884033.0],[276,2952145.0],[277,3021828.0],[278,3093117.0],[279,3166050.0],[280,3703614.0],[281,3316992.0],[282,3395080.0],[283,3474964.0],[284,3556685.0],[285,3640285.0],[286,3725807.0],[287,3813293.0],[288,3902789.0],[289,3994339.0],[290,4671988.0],[291,4183789.0],[292,4281785.0],[293,4382027.0],[294,4484566.0],[295,4589454.0],[296,4696744.0],[297,4806489.0],[298,4918746.0],[299,5033570.0],[300,12822360.0],[301,10805866.0],[302,11057768.0],[303,11315424.0],[304,11578964.0],[305,11848518.0],[306,12124224.0],[307,12406218.0],[308,12694642.0],[309,12989641.0],[310,15190128.0],[311,13599956.0],[312,13915577.0],[313,14238382.0],[314,14568534.0],[315,14906197.0],[316,15251539.0],[317,15604731.0],[318,15965951.0],[319,16335378.0],[320,19100795.0],[321,17099592.0],[322,17494759.0],[323,17898892.0],[324,18312193.0],[325,18734866.0],[326,19167122.0],[327,19609174.0],[328,20061241.0],[329,20523547.0],[330,23995795.0],[331,21479796.0],[332,21974211.0],[333,22479812.0],[334,22996847.0],[335,23525571.0],[336,24066245.0],[337,24619137.0],[338,25184517.0],[339,25762665.0],[340,30118703.0],[341,26958408.0],[342,27576591.0],[343,28208718.0],[344,28855100.0],[345,29516053.0],[346,30191903.0],[347,30882980.0],[348,31589623.0],[349,32312178.0],[350,37773000.0],[351,33806452.0],[352,34578900.0],[353,35368723.0],[354,36176307.0],[355,37002048.0],[356,37846347.0],[357,38709618.0],[358,39592521.0],[359,40494767.0],[360,47484000.0],[361,42360970.0],[362,43352607.0],[363,44311880.0],[364,45320273.0],[365,46351277.0],[366,47405393.0],[367,48143384.0],[368,49585021.0],[369,50712592.0],[370,59272000.0],[371,53040977.0],[372,54244921.0],[373,55412000.0],[374,56734230.0],[375,58020175.0],[376,59336138.0],[377,60680282.0],[378,62055682.0],[379,63461201.0],[380,74169278.0],[381,66367168.0],[382,67868939.0],[383,69404275.0],[384,70973878.0],[385,72578062.0],[386,74218962.0],[387,76895928.0],[388,77000000.0],[389,79362942.0],[390,92748135.0],[391,82986216.0],[392,84858616.0],[393,86000000.0],[394,88729440.0],[395,90729723.0],[396,92774524.0],[397,94864000.0],[398,97001370.0],[399,99485960.0],[400,252460528.0]];
 
  function Iaward(B, rec){ return Math.min(0.08 + (B/rec*8/70)/(1.08 + B/rec*8/70), 0.16); }
  function rnd(x){ return Math.floor(x + 0.5); }
 
  function perStep(rec){
    return STEPS.map(function(s){
      var B=s[1], C=s[2], I=Iaward(B, rec), H=rnd(B/(1+I)*I/C), J=B - H*C;
      return {J:J, H:H};
    });
  }
 
  // Power Up phases: [unlock PL threshold, flat bonus]. Only the first set (5 phases)
  // exists in-game so far. Each UNLOCKED phase (base >= threshold) grants
  // max(flatBonus, 5% of base). Powered-up total = base + sum of unlocked phase bonuses.
  var POWERUP_PHASES = [
    [20,      10],
    [240,     120],
    [2000,    1000],
    [24000,   12000],
    [200000,  100000]
  ];
  function poweredUp(base){
    var total = base;
    for(var i=0;i<POWERUP_PHASES.length;i++){
      var thr = POWERUP_PHASES[i][0], flat = POWERUP_PHASES[i][1];
      if(base >= thr){ total += Math.max(flat, 0.05*base); }
    }
    return total;
  }
  // Minimum boss PL needed to Zenkai = powered-up total * 1.10.
  function bossPL(J, pu){
    var boosted = pu ? poweredUp(J) : J;
    return boosted * 1.10;
  }
  // First PP stage whose boss power >= required boss PL. null if beyond the known table.
  function ppStage(reqBossPL){
    for(var i=0;i<PP.length;i++){ if(PP[i][1] >= reqBossPL) return PP[i][0]; }
    return null;
  }
  // PP Boss Search: given a (powered-up) PL, return the first PP stage whose boss PL
  // is at or above it, plus that stage's boss PL. null if beyond the known table.
  function ppBossSearch(pl){
    for(var i=0;i<PP.length;i++){ if(PP[i][1] >= pl) return {stage:PP[i][0], bossPL:PP[i][1]}; }
    return null;
  }
 
  // Find a Zenkai-ready boss: a Zenkai requires the boss PL to be at least the player's
  // (powered-up) Power Level + 10%, i.e. boss PL >= player PL * 1.10. Return the FIRST
  // (weakest qualifying) PP boss meeting that bar, with both its own PL and the required
  // minimum (player PL * 1.10). null if no boss is strong enough (beyond PP 400).
  function zenkaiPPSearch(pl){
    var required = pl * 1.10;
    for(var i=0;i<PP.length;i++){
      if(PP[i][1] >= required) return {stage:PP[i][0], bossPL:PP[i][1], required:required};
    }
    return null;
  }
 
  // Dynamic lower-bound floor as a fraction of the record:
  // 0.2% base; from 2,000,000 up it scales (record / 10,000,000 as a percent), capped at 10%.
  function floorValue(rec){
    var pct = Math.min(Math.max(0.2, rec/1e7), 10); // percent
    return rec * pct/100;
  }
 
  // Full green set for a given lower bound. Eligible: bound < J <= record.
  // Threshold = 3rd-largest Special Power Gains among eligible rows.
  function greenList(rec, bound){
    var rows = perStep(rec);
    var elig = rows.filter(function(r){ return r.J <= rec && r.J > bound; });
    if(!elig.length) return [];
    var Hs = elig.map(function(r){return r.H;}).sort(function(a,b){return b-a;});
    var thresh = Hs[Math.min(2, Hs.length-1)];
    return elig.filter(function(r){ return r.H >= thresh; }).sort(function(a,b){ return a.J - b.J; });
  }
 
  // Baseline best three (highest-J greens above the dynamic floor).
  function bestThree(rec, current){
    var bound = Math.max(current, floorValue(rec));
    return greenList(rec, bound).slice(-3);
  }
 
  // Build the three target slots, honouring how many Zenkais are already done.
  // - The first `done` slots are LOCKED to their original baseline values.
  // - Each remaining slot keeps its ORIGINAL baseline target unless Current Base Power
  //   has passed it (or an earlier slot advanced past it); only then does it advance to
  //   the next best green above Current. A slot re-chains only when the one before it moved.
  // Each returned slot: {J,H,locked,passed} or null when nothing fits.
  function planTargets(rec, current, done){
    var baseline = greenList(rec, floorValue(rec)).slice(-3);
    while(baseline.length<3) baseline.unshift(null);
 
    var slots = [];
    for(var i=0;i<done && i<3;i++){
      slots.push(baseline[i] ? {J:baseline[i].J, H:baseline[i].H, locked:true} : null);
    }
 
    // Greens available above where the player actually is now, used only when a slot
    // must advance. Consumed left-to-right so advanced slots stay distinct and ordered.
    var pool = greenList(rec, current);
    var poolIdx = 0;
 
    for(var s=done; s<3; s++){
      var orig = baseline[s];
      var prevJ = slots.length ? (slots[slots.length-1] ? slots[slots.length-1].J : 0) : 0;
      // A slot must advance if Current has reached/passed its original target,
      // or if the previous slot advanced beyond this original (keeping order).
      var mustAdvance = !orig || current >= orig.J || (prevJ && prevJ >= orig.J);
      if(!mustAdvance){
        slots.push({J:orig.J, H:orig.H, locked:false});
        // keep pool cursor past this value so a later advance won't reuse it
        while(poolIdx < pool.length && pool[poolIdx].J <= orig.J) poolIdx++;
        continue;
      }
      // Advance: take the next green strictly above both Current and the previous slot.
      var minJ = Math.max(current, prevJ);
      while(poolIdx < pool.length && pool[poolIdx].J <= minJ) poolIdx++;
      if(poolIdx < pool.length){
        var c = pool[poolIdx++];
        slots.push({J:c.J, H:c.H, locked:false, advanced:true});
      } else {
        slots.push(null);
      }
    }
    return slots;
  }
 
  function fmt(n){
    if(n>=1000) return Math.round(n).toLocaleString('en-US');
    return (Math.round(n*100)/100).toLocaleString('en-US');
  }
 
  var root, recEl, curEl, puEl, doneEl, outEl, noteEl, swText, searchEl, searchOutEl, zenkaiSearchEl, zenkaiSearchOutEl;
 
  function render(){
    var rec = parseFloat(recEl.value);
    var curRaw = parseFloat(curEl.value);
    var current = isNaN(curRaw) ? 0 : curRaw;
    var pu = puEl.checked;
    var done = parseInt(doneEl.value, 10) || 0;
    swText.textContent = pu ? 'On' : 'Off';
 
    if(!rec || rec<=0 || isNaN(rec)){
      outEl.innerHTML = '<p class="zc-empty">Enter your Base Power Record to see the three best Zenkai targets.</p>';
      noteEl.textContent = '';
      return;
    }
    if(current >= rec){
      outEl.innerHTML = '<p class="zc-empty">Current Base Power is at or above your record. Set it lower to see remaining targets.</p>';
      noteEl.textContent = '';
      return;
    }
    var slots = planTargets(rec, current, done);
    if(!slots.some(function(s){return s;})){
      outEl.innerHTML = '<p class="zc-empty">No targets available with these values.</p>';
      noteEl.textContent = '';
      return;
    }
 
    var labels = ['1st target','2nd target','3rd target'];
    outEl.innerHTML = slots.map(function(p,i){
      if(!p){
        return '<div class="zc-card zc-card--na">'
          + '<div class="zc-rank-row"><p class="zc-rank">'+labels[i]+'</p></div>'
          + '<p class="zc-pl">&mdash;</p>'
          + '<p class="zc-pl-label">No further target in range</p></div>';
      }
      var req = bossPL(p.J, pu);
      var stage = ppStage(req);
      var stageText = (stage===null) ? 'Beyond PP 400+' : 'PP '+stage;
      var lockBadge = p.locked ? '<span class="zc-lock">Done</span>' : '';
      var cardCls = 'zc-card' + (p.locked ? ' zc-card--locked' : '');
      var boosted = poweredUp(p.J);
      var gain = boosted - p.J;
      var poweredLine = gain > 0
        ? '<p class="zc-powered">Powered up: <span class="zc-powered-v">'+fmt(boosted)+'</span> <span class="zc-powered-pct">(+'+fmt(gain)+')</span></p>'
        : '<p class="zc-powered zc-powered--none">No Power Up unlocked yet</p>';
      return '<div class="'+cardCls+'">'
        + '<div class="zc-rank-row"><p class="zc-rank">'+labels[i]+'</p>'+lockBadge+'</div>'
        + '<p class="zc-pl">'+fmt(p.J)+'</p>'
        + '<p class="zc-pl-label">Base Power to Zenkai at</p>'
        + poweredLine
        + '<div class="zc-stat">'
        +   '<div class="zc-stat-row"><span class="zc-stat-k">Special Power Gains</span><span class="zc-stat-v zc-stat-v--gain">'+p.H+'</span></div>'
        +   '<div class="zc-stat-row"><span class="zc-stat-k">Min. Boss PL</span><span class="zc-stat-v">'+fmt(req)+'</span></div>'
        +   '<div class="zc-stat-row"><span class="zc-stat-k">First PP Stage</span><span class="zc-stat-v zc-stat-v--pp">'+stageText+'</span></div>'
        + '</div></div>';
    }).join('');
 
    var doneNote = done>0 ? ('First '+done+' target'+(done>1?'s':'')+' locked as done; later targets stay put unless your Current Base Power passes them. ') : '';
    noteEl.textContent = doneNote + (pu
      ? 'Min. Boss PL and PP stage include your Power Up aura. The toggle does not change which targets are chosen.'
      : 'Power Up off: Min. Boss PL is the raw target. Turn it on to factor in your aura boost.');
  }
 
  function renderSearch(){
    var pl = parseFloat(searchEl.value);
    if(!pl || pl<=0 || isNaN(pl)){
      searchOutEl.innerHTML = '<span class="zc-search-empty">Enter a Power Level to find the matching PP boss.</span>';
      return;
    }
    var res = ppBossSearch(pl);
    if(res === null){
      searchOutEl.innerHTML = '<span class="zc-search-empty">No PP boss at or above that Power Level &mdash; beyond PP 400.</span>';
      return;
    }
    searchOutEl.innerHTML =
      '<div class="zc-search-result">'
      + '<span class="zc-search-stage"><b>PP '+res.stage+'</b></span>'
      + '<span class="zc-search-boss">Boss PL: <span>'+fmt(res.bossPL)+'</span></span>'
      + '</div>';
  }
 
  function renderZenkaiSearch(){
    var pl = parseFloat(zenkaiSearchEl.value);
    if(!pl || pl<=0 || isNaN(pl)){
      zenkaiSearchOutEl.innerHTML = '<span class="zc-search-empty">Enter a Current Base Power (powered up) to find a Zenkai-ready boss.</span>';
      return;
    }
    var res = zenkaiPPSearch(pl);
    if(res === null){
      zenkaiSearchOutEl.innerHTML = '<span class="zc-search-empty">No PP boss is strong enough &mdash; required Boss PL is beyond PP 400.</span>';
      return;
    }
    zenkaiSearchOutEl.innerHTML =
      '<div class="zc-search-result">'
      + '<span class="zc-search-stage"><b>PP '+res.stage+'</b></span>'
      + '<span class="zc-search-boss">Boss PL: <span>'+fmt(res.bossPL)+'</span></span>'
      + '<span class="zc-search-boss">Min. required (+10%): <span>'+fmt(res.required)+'</span></span>'
      + '</div>';
  }
 
  function init(){
    root = document.getElementById('zenkai-calc');
    if(!root || root.getAttribute('data-zc-ready')) return;
    root.setAttribute('data-zc-ready','1');
    recEl = root.querySelector('#zc-record');
    curEl = root.querySelector('#zc-current');
    puEl  = root.querySelector('#zc-unlocked');
    doneEl= root.querySelector('#zc-done');
    outEl = root.querySelector('#zc-results');
    noteEl= root.querySelector('#zc-note');
    swText= root.querySelector('.zc-swtext');
    searchEl = root.querySelector('#zc-search-pl');
    searchOutEl = root.querySelector('#zc-search-out');
    zenkaiSearchEl = root.querySelector('#zc-search-zenkai-pl');
    zenkaiSearchOutEl = root.querySelector('#zc-search-zenkai-out');
    recEl.addEventListener('input', render);
    curEl.addEventListener('input', render);
    puEl.addEventListener('change', render);
    doneEl.addEventListener('change', render);
    searchEl.addEventListener('input', renderSearch);
    zenkaiSearchEl.addEventListener('input', renderZenkaiSearch);
    render();
    renderSearch();
    renderZenkaiSearch();
  }
 
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
